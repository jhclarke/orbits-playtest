<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Dark navy background circle -->
  <circle cx="96" cy="96" r="96" fill="#0a0a1a"/>

  <!-- Subtle star field -->
  <circle cx="32" cy="28" r="1.2" fill="#ffffff" opacity="0.6"/>
  <circle cx="158" cy="44" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="48" cy="155" r="1.4" fill="#ffffff" opacity="0.4"/>
  <circle cx="162" cy="148" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="140" cy="22" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="22" cy="110" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="170" cy="90" r="1.2" fill="#ffffff" opacity="0.5"/>

  <!-- Orbit ring (gold ellipse, slightly tilted for perspective) -->
  <ellipse
    cx="96" cy="96"
    rx="58" ry="36"
    fill="none"
    stroke="#d4a843"
    stroke-width="3.5"
    stroke-opacity="0.9"
    transform="rotate(-20, 96, 96)"
  />

  <!-- Central planet (destination body) -->
  <circle cx="96" cy="96" r="18" fill="#2a1a4a"/>
  <circle cx="96" cy="96" r="18" fill="url(#planetGrad)"/>
  <!-- Planet glow ring -->
  <circle cx="96" cy="96" r="22" fill="none" stroke="#9060c0" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Probe dot (light blue) on the orbit ring -->
  <!-- Position calculated at ~315° on the tilted ellipse -->
  <circle
    cx="139" cy="74"
    r="6"
    fill="#4fc3f7"
  />
  <!-- Probe glow -->
  <circle
    cx="139" cy="74"
    r="9"
    fill="none"
    stroke="#4fc3f7"
    stroke-width="1.5"
    stroke-opacity="0.4"
  />

  <!-- Short probe trail (fading dots behind the probe) -->
  <circle cx="128" cy="65" r="3.5" fill="#4fc3f7" opacity="0.55"/>
  <circle cx="116" cy="59" r="2" fill="#4fc3f7" opacity="0.3"/>

  <!-- Gradient definitions -->
  <defs>
    <radialGradient id="planetGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6040a0"/>
      <stop offset="100%" stop-color="#1a0a30"/>
    </radialGradient>
  </defs>
</svg>
